# Alembic configuration for ShadowTrace (async).
# The database URL is injected at runtime from app settings (env.py), so no
# credentials are stored here.
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# Migration filenames are exactly the revision id (e.g. 0001_initial_schema.py).
file_template = %%(rev)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
