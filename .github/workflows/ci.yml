name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: backend-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (dev extras)
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format --check app tests

      - name: Mypy
        run: mypy app

  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: shadowtrace
          POSTGRES_PASSWORD: shadowtrace
          POSTGRES_DB: shadowtrace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shadowtrace -d shadowtrace"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://shadowtrace:shadowtrace@localhost:5432/shadowtrace
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (dev extras)
        run: pip install -e ".[dev]"

      - name: Pytest with coverage
        run: >
          pytest --cov=app --cov-report=term
          --cov-report=xml:coverage.xml

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: warn

  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose -f infra/docker-compose.yml build

      - name: Start stack and health-check
        run: |
          set -euo pipefail
          cleanup() { docker compose -f infra/docker-compose.yml down || true; }
          trap cleanup EXIT
          docker compose -f infra/docker-compose.yml up -d
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health >/dev/null; then
              echo "backend healthy"
              curl -sf http://localhost:8000/api/v1/health
              exit 0
            fi
            sleep 2
          done
          echo "backend health check timed out"
          docker compose -f infra/docker-compose.yml logs
          exit 1
